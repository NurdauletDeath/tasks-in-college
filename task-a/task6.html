<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 6 - Output Values with this</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #7f1d1d;
    }

    .card {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(153, 27, 27, 0.14);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    ul {
      padding-left: 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>6 тапсырма: Объект ішінен this арқылы мән шығару</h1>
    <p>Method ішінен <code>this</code> арқылы объект мәндерін экранға шығарамыз:</p>
    <ul id="result"></ul>
  </main>

  <script>
    const car = {
      brand: "Toyota",
      model: "Camry",
      year: 2024,
      printDetails() {
        return `Көлік: ${this.brand} ${this.model}, жылы: ${this.year}`;
      }
    };

    const result = [
      `brand = ${car.brand}`,
      `model = ${car.model}`,
      `year = ${car.year}`,
      `printDetails() => ${car.printDetails()}`
    ];

    document.getElementById("result").innerHTML = result
      .map((item) => `<li>${item}</li>`)
      .join("");

    console.log("Task 6:", car.printDetails());
  </script>
</body>
</html>
