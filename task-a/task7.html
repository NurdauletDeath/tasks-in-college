<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 7 - Method and this</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ecfccb, #d9f99d);
      color: #365314;
    }

    .card {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(63, 98, 18, 0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    ul {
      padding-left: 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>7 тапсырма: Объектке method қосу</h1>
    <p>Method объект қасиеттерін <code>this</code> арқылы пайдаланады:</p>
    <ul id="result"></ul>
  </main>

  <script>
    const employee = {
      firstName: "Alina",
      lastName: "Serik",
      position: "Frontend Developer",
      introduce() {
        return `${this.firstName} ${this.lastName} - ${this.position}`;
      }
    };

    const result = [
      `firstName = ${employee.firstName}`,
      `lastName = ${employee.lastName}`,
      `position = ${employee.position}`,
      `introduce() => ${employee.introduce()}`
    ];

    document.getElementById("result").innerHTML = result
      .map((item) => `<li>${item}</li>`)
      .join("");

    console.log("Task 7:", employee.introduce());
  </script>
</body>
</html>
