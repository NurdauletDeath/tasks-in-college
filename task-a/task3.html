<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3 - Alias</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #14532d;
    }

    .card {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(20, 83, 45, 0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    ul {
      padding-left: 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>3 тапсырма: Alias қолдану</h1>
    <p>Айнымалылардың атын өзгертіп алу үшін alias қолданамыз:</p>
    <ul id="result"></ul>
  </main>

  <script>
    const book = {
      title: "JavaScript Basics",
      author: "Dana",
      year: 2026
    };

    const {
      title: bookTitle,
      author: bookAuthor,
      year: publishYear
    } = book;

    const result = [
      `Бастапқы объект: title = ${book.title}, author = ${book.author}, year = ${book.year}`,
      `bookTitle = ${bookTitle}`,
      `bookAuthor = ${bookAuthor}`,
      `publishYear = ${publishYear}`
    ];

    document.getElementById("result").innerHTML = result
      .map((item) => `<li>${item}</li>`)
      .join("");

    console.log("Task 3:", { book, bookTitle, bookAuthor, publishYear });
  </script>
</body>
</html>
